# Event-native 3D per-event segmentation.
#
# Differences vs configs/hand_segmentation.yaml (dense voxel U-Net):
#   - TASK = event_segmentation -> ModelInterface routes to _event_segmentation_step,
#     which consumes a SparseEventBatch and emits one logit per EVENT.
#   - DATA = HandEventStreamDataset -> yields per-event (x,y), normalized time and
#     polarity (NO per-pixel merge: the temporal axis is preserved). Its `collate_fn`
#     staticmethod is auto-selected by DataInterface for ragged batching.
#   - MODEL = EventSparseSeg -> 3D submanifold sparse-conv U-Net over (t,y,x) + a
#     per-event MLP head; output is one logit per input event (a true event stream).
#
# Supervision: each event is labeled directly from the cached SAM 2 mask
# (label = mask[y,x]) and the per-event logits are supervised against those labels
# with EventDistillationLoss (SCE + per-sample Lovász-hinge). The previous per-event
# model scored ~0.10 IoU mainly because it collapsed the time axis into a 2D
# pixel-merge; this rewrite keeps every event in 3D (t,y,x).
#
# Requires spconv v2 (see requirements.txt). Start single-GPU on L40S; scale
# DISTRIBUTED.devices once the pipeline is validated.

TRAINING:
  deterministic: False
  use_compile: False          # torch.compile + spconv custom ops don't mix
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: event_segmentation
  # LOSS VARIANT: GCE + Lovász. Generalized Cross-Entropy / L_q (Zhang & Sabuncu
  # NeurIPS 2018) is the lowest-risk noise-robust pointwise term (one knob q
  # interpolating CE<->MAE); a strict generalization of bare RCE. bce_weight=0 turns
  # SCE off so GCE is the sole pointwise term; Lovász stays as the IoU/imbalance lever.
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 2.0
    gce_weight: 1.0
    gce_q: 0.7
    gce_truncate: 0.0      # set ~0.3 to prune likely-mislabeled events (truncated-GCE)
    lovasz_weight: 1.0
  # One held-out preview video per rank at each validation epoch (Events |
  # Teacher GT | Prediction), same as hand_tracking.yaml. Per-event predictions
  # are rasterized to a dense mask for the prediction panel. With devices: 1 only
  # one sequence renders; raise DISTRIBUTED.devices to render more.
  val_preview_count: 8

DISTRIBUTED:
  accelerator: gpu
  devices: 4                  # single-GPU bring-up; raise after validation
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 36.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun           # LOSO held-out subject for val/test
      require_teacher: True
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 150000                # cap per window (bursty-window guard)
      # Event-native augmentation (train only; data/event_augment.py). Targets the
      # cross-subject (LOSO) train>val gap: geometric (hand size/pose/position),
      # density (motion-speed -> event-rate), and noise invariance, plus event-
      # specific temporal/polarity transforms. Every per-event label travels with
      # its event, so supervision stays valid. Set enabled: False to ablate.
      # Magnitudes follow the event-aug literature (NDA ECCV'22, EventDrop IJCAI'21).
      augmentation:
        enabled: True
        # --- minimal set: the 4 that target the cross-subject DOF most directly ---
        hflip_prob: 0.5             # handedness / approach side
        affine_prob: 0.5            # rotate+scale+translate as one transform (pose/size/pos)
        rotate_deg: 15.0
        scale_range: [0.85, 1.20]   # hand apparent size varies by subject/reach
        translate_frac: 0.10
        event_drop_prob: 0.5        # EventDrop: high-rate-train -> low-rate-test
        event_drop_frac: [0.0, 0.5]
        upsample_prob: 0.3          # inverse of drop: low-rate-train -> high-rate-test
        upsample_range: [1.0, 1.5]
        # --- full set: add after the minimal set is validated ---
        vflip_prob: 0.0             # off (would flip up/down orientation)
        jitter_px: 1.0              # sub-pixel coord noise (incl. mount/calib offset)
        area_drop_prob: 0.25        # occlusion: drop a random box of events
        area_drop_frac: 0.20
        time_crop_prob: 0.25        # keep a temporal sub-window, then renormalize
        time_crop_min: 0.7          # >=0.7 so the SAM2-labeled frame's events survive
        time_reverse_prob: 0.2      # reverse time + flip polarity (physical)
        polarity_flip_prob: 0.1
        time_jitter: 0.01
        noise_frac: 0.05            # background sensor-noise events (label 0); keep <=0.05
        min_events: 64
      num_classes: 1                    # consumed by ModelInterface + config validator
  dataloader:
    batch_size: 8                       # sparse is light; bump until GPU-bound
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True                    # SparseEventBatch implements pin_memory()
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_sparse_seg
  class_name: EventSparseSeg
  model_init_args:
    in_features: 2                      # = HandEventStreamDataset.NUM_FEATURES (pol, t_norm)
    stage_channels: [24, 32, 48, 64]    # 3D submanifold U-Net widths
    time_bins: 6                        # T temporal voxel bins (the 3rd spatial dim)
    num_classes: 1
    head_hidden: 64                     # per-event MLP head width
    dropout: 0.2                        # regularizer vs fast LOSO overfit (0.1-0.3)
    norm: ln                            # LayerNorm over channels: LOSO-safe default
    # spconv conv algorithm. "native" (gather + dense cuBLAS GEMM + scatter)
    # avoids the implicit-GEMM SIGFPE seen when the spconv wheel's build-time CUDA
    # is older than the torch runtime (cu120 wheel under cu128 torch). Once spconv
    # is realigned with the CUDA runtime, set this to null for the faster default.
    algo: native

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_event_seg_sparse_gce

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  # Per-event foreground F1 is the task-aligned selection metric (val_iou is the
  # rasterized-vs-FLIR-mask proxy, capped by event sparsity — see analysis).
  monitor: val_event_f1_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_event_f1_epoch:.4f}"
  save_top_k: 1
  save_last: True
