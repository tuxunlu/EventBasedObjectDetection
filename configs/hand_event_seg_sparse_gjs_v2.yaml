# Event-native 3D per-event segmentation — v2 (anti-false-positive).
#
# Builds on configs/hand_event_seg_sparse_gjs.yaml. That baseline cleanly isolated
# the static background but leaked a lot of OTHER moving/edge/noise events (keyboard,
# cable, shadows) into the hand+arm class: predicted FG 11.6% vs GT 9.9%, F1 ~0.70.
# Root cause: the model only saw (polarity, time), so it learned a generic
# "moving-edge" detector, not a "hand" detector — and the single-frame teacher mask,
# projected onto a 36 ms motion-blurred window, taught a dilated/fuzzy boundary.
#
# This config turns on the three-tier fix:
#   TIER 1 (features) — model.geom_features + density_features give every event its
#     normalized (x,y) position and a local event-density / temporal signature, plus
#     finer time_bins (6 -> 10). This is the channel the 2-feature input lacked most.
#   TIER 2 (supervision) — dataset boundary_ignore_px (trimap edge -> ignore) and
#     time_ignore_frac (ignore window ends, most misaligned with the mask), plus a
#     mild window shrink (36 -> 30 ms). EventDistillationLoss drops label<0.
#   TIER 3 (decision) — pos_weight 2.0 -> 1.0, an added precision-favoring
#     Focal-Tversky term, an epoch val threshold sweep (val_event_f1_best /
#     val_event_thr), and a spatial-coherence-cleaned IoU diagnostic (val_iou_clean).

TRAINING:
  deterministic: False
  use_compile: False
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: event_segmentation
  # GJS (noise-robust pointwise) + Lovász (IoU surrogate), now rebalanced toward
  # precision: pos_weight lowered to 1.0 and a Focal-Tversky term with alpha>beta
  # (penalize FALSE POSITIVES harder than false negatives) directly attacks the
  # other-motion leakage. Tversky gamma=1.0 = plain Tversky (no focal sharpening).
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 1.0
    gjs_weight: 1.0
    gjs_pi1: 0.5
    lovasz_weight: 1.0
    tversky_weight: 0.5
    tversky_alpha: 0.7        # FP weight  (> beta => favor precision)
    tversky_beta: 0.3         # FN weight
    tversky_gamma: 1.0
  # Decision-threshold sweep + spatial-coherence cleanup diagnostics (Tier 3).
  event_eval_config:
    thr_min: 0.05
    thr_max: 0.95
    thr_steps: 19
    clean_enabled: True
    clean_open_ksize: 3       # morphological open: drops 1-px speckle
    clean_keep_largest: False # set True to keep only the hand+arm blob
    clean_min_area: 0
  val_preview_count: 4

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 30.0                   # TIER 2: mild shrink (was 36) -> mask more valid across window
      image_height: 480
      image_width: 640
      held_out_subject: tuxun
      require_teacher: True
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 150000
      # TIER 2: train-only label refinement (ignored events -> label -1 -> dropped
      # by EventDistillationLoss). val/test keep clean {0,1} labels for honest F1/IoU.
      boundary_ignore_px: 3             # trimap: ignore events in a 3-px band at the mask edge
      time_ignore_frac: 0.10            # ignore events in the first/last 10% of the window
      augmentation:
        enabled: True
        hflip_prob: 0.5
        affine_prob: 0.5
        rotate_deg: 15.0
        scale_range: [0.85, 1.20]
        translate_frac: 0.10
        event_drop_prob: 0.5
        event_drop_frac: [0.0, 0.5]
        upsample_prob: 0.3
        upsample_range: [1.0, 1.5]
        vflip_prob: 0.0
        jitter_px: 1.0
        area_drop_prob: 0.25
        area_drop_frac: 0.20
        time_crop_prob: 0.25
        time_crop_min: 0.7
        time_reverse_prob: 0.2
        polarity_flip_prob: 0.1
        time_jitter: 0.01
        noise_frac: 0.05
        min_events: 64
      num_classes: 1
  dataloader:
    batch_size: 8
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_sparse_seg
  class_name: EventSparseSeg
  model_init_args:
    in_features: 2                      # dataset feats (pol, t_norm); extra channels are synthesized in-model
    stage_channels: [24, 32, 48, 64]
    time_bins: 10                       # TIER 1: finer motion resolution (was 6); 30ms/10 = 3ms bins
    num_classes: 1
    head_hidden: 64
    dropout: 0.2
    norm: ln
    algo: native
    # TIER 1: enrich the 2-channel (polarity, time) input with geometry + motion.
    geom_features: True                 # + normalized (x, y)
    density_features: True              # + log local density, neighborhood time mean/std
    density_radius: 2                   # 5x5 neighborhood for the density/timing features

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_event_seg_sparse_gjs_v2

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  monitor: val_event_f1_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_event_f1_epoch:.4f}"
  save_top_k: 1
  save_last: True
