# Event-native 3D per-event segmentation — MULTI-LEVEL global context + FIX A.
#
# Goal of this run (multi-scale dense context + the no-hand null state)
# --------------------------------------------------------------------
# EventSparseSegGC injects dense global context only at the /8 bottleneck, so the
# FINE encoder levels (/2, /4) still reason with the purely-submanifold field — they
# never cross empty space — and the global hand-blob shape only reaches them after a
# round trip through the bottleneck. EventSparseSegGCML adds an independent dense-
# context module at the /2 AND /4 levels as well (a pyramid of cross-empty-space
# context), so every resolution — fine boundary features included — reasons with
# spatial context. The finer maps use a narrower width (context_channels_enc) to stay
# cheap; cost is still fixed-size (event-count-independent).
#
# It also carries Fix A (the no-hand ``hand_drop`` augmentation, shared below): the
# global "a hand exists here" prior is even stronger with multi-level context, so the
# no-hand null-state negatives matter here too.
#
# The augmentation block + every loss/optimizer/eval setting are SHARED VERBATIM with
# gc_a / gc_ab, so the three runs differ ONLY in the model. Smoke-test first:
#   python tools/smoke_test_event_sparse.py --model gc_ml

TRAINING:
  deterministic: False
  use_compile: False          # torch.compile + spconv custom ops don't mix
  inference_mode: False
  seed: 42
  max_epochs: 50
  num_sanity_val_steps: 0
  task: event_segmentation
  # LOSS: identical to the 0.654 GJS baseline (GJS + per-sample Lovász, pos_weight 2.0)
  # so the static-FP fix stays attributable to the data/aug change, not the loss.
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 2.0
    gjs_weight: 1.0
    gjs_pi1: 0.5
    lovasz_weight: 1.0
  event_eval_config:
    thr_min: 0.05
    thr_max: 0.95
    thr_steps: 19
    clean_enabled: True
    clean_open_ksize: 3
    clean_keep_largest: False
    clean_min_area: 0
  val_preview_count: 8

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 36.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun
      require_teacher: True
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 150000
      boundary_ignore_px: 0
      time_ignore_frac: 0.0
      # HARDER event-native augmentation + Fix A no-hand negatives. Shared verbatim
      # with gc_ab / gc_ml so the three runs differ only in the model. Stronger
      # geometric/density/occlusion/noise than the baseline to close the cross-subject
      # LOSO gap; hand_drop_prob adds the NO-HAND null-state negatives.
      augmentation:
        enabled: True
        hflip_prob: 0.5
        vflip_prob: 0.0
        affine_prob: 0.6
        rotate_deg: 20.0
        scale_range: [0.75, 1.35]
        translate_frac: 0.15
        jitter_px: 1.5
        event_drop_prob: 0.6
        event_drop_frac: [0.0, 0.6]
        upsample_prob: 0.3
        upsample_range: [1.0, 1.6]
        area_drop_prob: 0.35
        area_drop_frac: 0.22
        area_drop_count: 2            # multiple occlusion boxes (harder occlusion)
        time_crop_prob: 0.35
        time_crop_min: 0.6
        time_reverse_prob: 0.2
        polarity_flip_prob: 0.1
        time_jitter: 0.015
        noise_frac: 0.10
        min_events: 64
        hand_drop_prob: 0.20          # Fix A: fraction of windows made NO-HAND negatives
        hand_drop_dilate_px: 0        # also drop bg events within N px of any fg event
      num_classes: 1
  dataloader:
    batch_size: 8
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_sparse_seg_gc_ml
  class_name: EventSparseSegGCML
  model_init_args:
    in_features: 2
    stage_channels: [24, 32, 48, 64]
    time_bins: 6
    num_classes: 1
    head_hidden: 64
    norm: ln
    algo: native
    context_channels: 48              # /8 bottleneck context width
    context_gather: True
    aux_shape_head: True
    aux_grid: 32
    aux_shape_weight: 0.2
    coord_mode: relative
    dropout: 0.2
    drop_path: 0.1
    # --- multi-level dense context (the new core) ----------------------------------
    context_channels_enc: 32          # /2 and /4 encoder-level context width (narrower)
    context_levels: 3                 # 3 => context at /2 and /4; 2 => /4 only

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: True
    swa_lrs: 1e-4

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_event_seg_sparse_gc_ml

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  monitor: val_event_f1_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_event_f1_epoch:.4f}"
  save_top_k: 1
  save_last: True
