TRAINING:
  deterministic: false
  use_compile: false
  inference_mode: false
  seed: 42
  max_epochs: 50
  num_sanity_val_steps: 0
  task: event_segmentation
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 2.0
    gjs_weight: 1.0
    gjs_pi1: 0.5
    lovasz_weight: 1.0
  event_eval_config:
    thr_min: 0.05
    thr_max: 0.95
    thr_steps: 19
    clean_enabled: true
    clean_open_ksize: 3
    clean_keep_largest: false
    clean_min_area: 0
  val_preview_count: 8
  val_check_interval: 4000
  limit_val_batches: 1000
DISTRIBUTED:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  strategy: auto
DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 144.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun
      require_teacher: true
      action_only: false
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 200000
      boundary_ignore_px: 0
      time_ignore_frac: 0.375
      time_ignore_val: true
      augmentation:
        enabled: true
        hflip_prob: 0.5
        affine_prob: 0.5
        rotate_deg: 15.0
        scale_range:
        - 0.85
        - 1.2
        translate_frac: 0.1
        event_drop_prob: 0.5
        event_drop_frac:
        - 0.0
        - 0.5
        upsample_prob: 0.3
        upsample_range:
        - 1.0
        - 1.5
        vflip_prob: 0.0
        jitter_px: 1.0
        area_drop_prob: 0.25
        area_drop_frac: 0.2
        time_crop_prob: 0.25
        time_crop_min: 0.7
        time_reverse_prob: 0.2
        polarity_flip_prob: 0.1
        time_jitter: 0.01
        noise_frac: 0.05
        min_events: 64
      num_classes: 1
  dataloader:
    batch_size: 8
    test_batch_size: 8
    num_workers: 8
    persistent_workers: true
    pin_memory: true
    multiprocessing_context: fork
    drop_last: true
    shuffle_train: true
    shuffle_val: false
    shuffle_test: false
MODEL:
  file_name: event_jepa_seg
  class_name: EventJEPASeg
  model_init_args:
    in_features: 2
    num_classes: 1
    patch_size: 32
    time_bins: 16
    dim: 192
    depth: 6
    heads: 4
    pred_depth: 3
    head_hidden: 128
    dropout: 0.1
    coord_mode: relative
    motion_radius: 3
    motion_min_count: 6
    crease_feature: true
    residual_feature: true
    dir_residual: true
    flow_loss_weight: 0.5
    jepa_weight: 0.5
    jepa_mask_ratio: 0.5
    mask_mode: future_all
    ema_momentum: 0.996
    var_weight: 1.0
    jepa_warmup_epochs: 10
    shear_consistency: false
    shear_max: 0.15
    shear_weight: 0.1
    presence_gate: true
    presence_gate_weight: 0.3
    presence_gate_scale: 1.0
    presence_min_fg: 0
    aux_shape_head: true
    aux_grid: 32
    aux_shape_weight: 0.2
    null_loss_weight: 0.0
    null_margin: 1.0
    max_gy: 24
    max_gx: 24
    max_t: 24
    max_tokens: 8192
OPTIMIZER:
  name: AdamW
  arguments:
    lr: 0.0003
    weight_decay: 0.0001
  gradient_accumulation:
    enabled: false
    scheduling:
      0: 4
      4: 2
      8: 1
  gradient_clip:
    enabled: true
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: true
    swa_lrs: 0.0001
SCHEDULER:
  learning_rate:
    enabled: true
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1.0e-06
  early_stopping:
    enabled: false
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1.0e-05
LOGGER:
  log_dir_root: lightning_logs
  experiment_name: run_jepa_big
CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_event_f1_epoch
  mode: max
  filename: best-e{epoch:03d}-s{step:07d}-f1{val_event_f1_epoch:.4f}
  save_top_k: 5
  save_last: true
