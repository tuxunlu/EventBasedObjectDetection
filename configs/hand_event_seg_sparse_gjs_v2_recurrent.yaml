# Event-native 3D per-event segmentation — v2 + recurrent bottleneck.
#
# Identical to configs/hand_event_seg_sparse_gjs_v2.yaml, plus a recurrent (GRU)
# module at the U-Net bottleneck (EventSparseSeg.recurrent). The encoder downsamples
# spatially only (stride=(1,2,2)), so the deepest features keep the FULL temporal
# resolution T; the GRU sweeps that t-axis at each spatial column, integrating the
# whole window's motion history before decoding. This complements the convs' local
# temporal mixing (kernel-window only) with a long-range recurrent pass — the lever
# against the FP-dominated "generic moving-edge" failure mode, since a real hand has a
# coherent motion trajectory across the window while distractor edges/noise do not.
#
# WITHIN-WINDOW recurrence only: state is NOT carried across successive windows (that
# would need a stateful step() API + dataset/collate changes). Bidirectional by default
# (sees future motion within the window — fine for offline window seg); set
# recurrent_bidirectional: False for a causal pass if later wrapped for streaming.
#
# Adds ~110k params on top of the ~407k baseline (bidirectional GRU at c3=64).

TRAINING:
  deterministic: False
  use_compile: False
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: event_segmentation
  # GJS (noise-robust pointwise) + Lovász (IoU surrogate), now rebalanced toward
  # precision: pos_weight lowered to 1.0 and a Focal-Tversky term with alpha>beta
  # (penalize FALSE POSITIVES harder than false negatives) directly attacks the
  # other-motion leakage. Tversky gamma=1.0 = plain Tversky (no focal sharpening).
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 1.0
    gjs_weight: 1.0
    gjs_pi1: 0.5
    lovasz_weight: 1.0
    tversky_weight: 0.5
    tversky_alpha: 0.7        # FP weight  (> beta => favor precision)
    tversky_beta: 0.3         # FN weight
    tversky_gamma: 1.0
  # Decision-threshold sweep + spatial-coherence cleanup diagnostics (Tier 3).
  event_eval_config:
    thr_min: 0.05
    thr_max: 0.95
    thr_steps: 19
    clean_enabled: True
    clean_open_ksize: 3       # morphological open: drops 1-px speckle
    clean_keep_largest: False # set True to keep only the hand+arm blob
    clean_min_area: 0
  val_preview_count: 4

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 30.0                   # TIER 2: mild shrink (was 36) -> mask more valid across window
      image_height: 480
      image_width: 640
      held_out_subject: tuxun
      require_teacher: True
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 150000
      # TIER 2: train-only label refinement (ignored events -> label -1 -> dropped
      # by EventDistillationLoss). val/test keep clean {0,1} labels for honest F1/IoU.
      boundary_ignore_px: 3             # trimap: ignore events in a 3-px band at the mask edge
      time_ignore_frac: 0.10            # ignore events in the first/last 10% of the window
      augmentation:
        enabled: True
        hflip_prob: 0.5
        affine_prob: 0.5
        rotate_deg: 15.0
        scale_range: [0.85, 1.20]
        translate_frac: 0.10
        event_drop_prob: 0.5
        event_drop_frac: [0.0, 0.5]
        upsample_prob: 0.3
        upsample_range: [1.0, 1.5]
        vflip_prob: 0.0
        jitter_px: 1.0
        area_drop_prob: 0.25
        area_drop_frac: 0.20
        time_crop_prob: 0.25
        time_crop_min: 0.7
        time_reverse_prob: 0.2
        polarity_flip_prob: 0.1
        time_jitter: 0.01
        noise_frac: 0.05
        min_events: 64
      num_classes: 1
  dataloader:
    batch_size: 8
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_sparse_seg
  class_name: EventSparseSeg
  model_init_args:
    in_features: 2                      # dataset feats (pol, t_norm); extra channels are synthesized in-model
    stage_channels: [24, 32, 48, 64]
    time_bins: 10                       # TIER 1: finer motion resolution (was 6); 30ms/10 = 3ms bins
    num_classes: 1
    head_hidden: 64
    dropout: 0.2
    norm: ln
    algo: native
    # TIER 1: enrich the 2-channel (polarity, time) input with geometry + motion.
    geom_features: True                 # + normalized (x, y)
    density_features: True              # + log local density, neighborhood time mean/std
    density_radius: 2                   # 5x5 neighborhood for the density/timing features
    # Recurrent bottleneck: GRU sweeping the temporal axis at each spatial column.
    recurrent: True
    recurrent_bidirectional: True       # sees future motion within the window (offline seg)
    # recurrent_hidden: null            # null -> tie to bottleneck width c3 (64)

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_event_seg_sparse_gjs_v2_recurrent

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  monitor: val_event_f1_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_event_f1_epoch:.4f}"
  save_top_k: 1
  save_last: True
