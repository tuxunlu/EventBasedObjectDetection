# Frame-based I-JEPA: HandEventDataset voxel -> EventJEPAFrame -> (N,1,H,W) mask.
# Dense analogue of the per-event JEPA: an EventUnet (BCE+Dice on cached SAM2 masks)
# with a TRAIN-ONLY I-JEPA pretext on the encoder bottleneck feature map. task=
# segmentation routes to ModelInterface._segmentation_step (3-tuple voxel/mask batch),
# which reads model._jepa_loss x jepa_weight (the dense hook).

TRAINING:
  deterministic: False
  use_compile: False
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: segmentation
  seg_pos_weight: null            # raise to ~5-20 if val_iou stalls (all-zero collapse)
  val_preview_count: 4

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_dataset
    class_name: HandEventDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      voxel_bins: 20                # MUST equal MODEL.in_channels
      window_ms: 144.0
      image_height: 240
      image_width: 320
      held_out_subject: tuxun
      require_teacher: True
      action_only: True
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      provide_rgb: False
      num_classes: 1
      # split_mode: loso = leave-one-subject-out (cross-subject generalization).
      # Switch to 'all' to pool all 4 subjects with an in-distribution sequence-level
      # holdout (lifts the LOSO diversity ceiling — see loso-ceiling memory).
      split_mode: all
      val_frac: 0.1               # used only when split_mode='all'
      test_frac: 0.1
      split_seed: 42
      augmentation:
        enabled: True
        hflip_prob: 0.5
        affine_prob: 0.5
        rotate_deg: 10.0
        scale_range: [0.9, 1.1]
        translate_frac: 0.05
  dataloader:
    batch_size: 16
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_jepa_frame
  class_name: EventJEPAFrame
  model_init_args:
    in_channels: 20                # = voxel_bins
    encoder_channels: [48, 96, 128, 160]   # ~0.65M inference params (EventUnet width)
    num_classes: 1
    norm: gn                      # GroupNorm only (BatchNorm leaks the LOSO subject)
    gn_groups: 8
    use_se: True
    use_context: True
    context_dilations: [1, 2, 4]
    # ---- I-JEPA pretext (train-only; dropped at inference) ----
    jepa_weight: 1.0              # weight on the latent-prediction loss (0 disables)
    jepa_patch: 1                 # avg-pool factor over bottleneck cells -> token grid
                                  # (240x320 /8 = 30x40 = 1200 tokens at patch 1)
    jepa_mask_ratio: 0.6          # fraction of patch tokens masked as targets
    jepa_pred_dim: 160            # predictor token dim (= encoder_channels[-1])
    jepa_pred_depth: 2
    jepa_pred_heads: 4
    jepa_dropout: 0.0
    ema_momentum: 0.996
    var_weight: 1.0               # VICReg variance hinge (anti-collapse)
    max_grid: 96                  # max patch rows/cols for positional embeddings

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_seg_frame_jepa

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  monitor: val_iou_epoch          # dense metric (NOT val_event_f1_epoch)
  mode: max
  filename: "best-{epoch:03d}-{val_iou_epoch:.4f}"
  save_top_k: 1
  save_last: True
