# Phase B baseline: HandEventDataset + EventUnet (ANN) + BCE+Dice distillation.
# Switching TRAINING.task to "segmentation" tells ModelInterface to use the
# 3-tuple (voxel, mask, meta) batch contract and the DistillationLoss path.

TRAINING:
  deterministic: False
  use_compile: False
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: segmentation

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_dataset
    class_name: HandEventDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      voxel_bins: 5
      window_ms: 36.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun       # LOSO held-out subject for val/test
      require_teacher: True         # set False before running sam2_pseudo_labels.py
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks   # complete SAM 2 teacher masks
      # Carry through fields used by the placeholder MODEL section below.
      num_classes: 1
      augmentation:
        enabled: False
        probability: 0.0
  dataloader:
    batch_size: 12
    test_batch_size: 4
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_unet
  class_name: EventUnet
  model_init_args:
    in_channels: 5                  # = voxel_bins
    # 0.4M params at this width; landing in the plan's 0.4–0.8M target band.
    # Drop to [32, 64, 96, 128] for a ~118K-param ablation variant.
    encoder_channels: [64, 128, 192, 256]
    num_classes: 1

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_segmentation_phaseB_eventunet

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  # Segmentation: highest mIoU wins. Switch back to val_loss_epoch if you
  # prefer loss-based selection.
  monitor: val_iou_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_iou_epoch:.4f}"
  save_top_k: 1
  save_last: True
