# Phase B baseline: HandEventDataset + EventUnet (ANN) + BCE+Dice distillation.
# Switching TRAINING.task to "segmentation" tells ModelInterface to use the
# 3-tuple (voxel, mask, meta) batch contract and the DistillationLoss path.

TRAINING:
  deterministic: False
  use_compile: False
  inference_mode: False
  seed: 42
  max_epochs: 50
  task: segmentation

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_dataset
    class_name: HandEventDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      voxel_bins: 5
      window_ms: 36.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun       # LOSO held-out subject for val/test
      require_teacher: True         # set False before running sam2_pseudo_labels.py
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks   # complete SAM 2 teacher masks
      # Phase B supervises on the cached mask only — no online RGB teacher.
      provide_rgb: False
      # Carry through fields used by the placeholder MODEL section below.
      num_classes: 1
      # Train-only spatial augmentation. Off for val/test regardless. Combats
      # the LOSO subject-identity gap by preventing the network from memorizing
      # per-subject hand pose / position.
      augmentation:
        enabled: True
        hflip_prob: 0.5
        affine_prob: 0.5
        rotate_deg: 10.0
        scale_range: [0.9, 1.1]
        translate_frac: 0.05
  dataloader:
    batch_size: 4
    test_batch_size: 4
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_unet
  class_name: EventUnet
  model_init_args:
    in_channels: 5                  # = voxel_bins
    # ~0.65M params at this width (residual DW-sep + SE + global-context
    # bottleneck), landing in the plan's 0.4–0.8M target band. Bump to
    # [64, 128, 192, 256] (~1.4M) only if mask quality is capacity-limited.
    encoder_channels: [48, 96, 128, 160]
    num_classes: 1
    # GroupNorm preferred over BatchNorm for LOSO: no running statistics, so
    # the held-out subject's voxel distribution isn't normalized by training-
    # subject means. Bump groups upward (e.g. 16) for finer-grained channel
    # normalization if needed; clamped to the largest divisor of the channel
    # width automatically.
    norm: gn
    gn_groups: 8
    # Squeeze-excitation channel gating inside every residual block.
    use_se: True
    # ASPP-lite global-context bottleneck — the main driver of long-range mask
    # transfer from SAM 2. Set False (with use_se False) for the ~0.4M
    # purely-local ablation variant.
    use_context: True
    context_dilations: [1, 2, 4]

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: False
    swa_lrs: 1e-2

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_segmentation_phaseB_eventunet

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  # Segmentation: highest mIoU wins. Switch back to val_loss_epoch if you
  # prefer loss-based selection.
  monitor: val_iou_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_iou_epoch:.4f}"
  save_top_k: 1
  save_last: True
