# Event-native 3D per-event segmentation — GLOBAL-CONTEXT model + FIX A + FIX B (gate).
#
# Goal of this run (A + B: null state AND a multiplicative veto gate)
# ------------------------------------------------------------------
# Builds on Fix A (the no-hand ``hand_drop`` augmentation, shared below) by also
# fixing the OTHER half of the static-FP root cause: in EventSparseSegGC the dense
# global context is purely ADDITIVE — it can add foreground evidence but never VETO
# it — so the "a hand exists here" prior cannot be switched off on a handless scene.
#
# Fix B (model EventSparseSegGCGate) turns the context into a GATE. The coarse
# occupancy head (already teacher-supervised, SA-SSD style) is run at INFERENCE too,
# a global "hand-present" scalar is read off the whole-frame descriptor, and every
# per-event probability is MULTIPLIED by (occupancy-at-its-cell x hand-present):
#   p_final = sigmoid(raw) * sigmoid(occ_cell) * sigmoid(present).
# That product is a true veto — if occupancy or the global scalar say "no hand", the
# prediction is driven to ~0 regardless of how hand-like the local event looks. The
# gate is trained end-to-end (biases init OPEN so optimization starts unvetoed); the
# no-hand windows from Fix A are exactly what teach the global "present" scalar its
# negative class, which is why A+B is the intended pairing.
#
# The augmentation block + every loss/optimizer/eval setting are SHARED VERBATIM with
# gc_a / gc_ml, so the three runs differ ONLY in the model. Smoke-test first:
#   python tools/smoke_test_event_sparse.py --model gc_gate

TRAINING:
  deterministic: False
  use_compile: False          # torch.compile + spconv custom ops don't mix
  inference_mode: False
  seed: 42
  max_epochs: 50
  num_sanity_val_steps: 0
  task: event_segmentation
  # LOSS: identical to the 0.654 GJS baseline (GJS + per-sample Lovász, pos_weight 2.0)
  # so the static-FP fix stays attributable to the data/aug change, not the loss.
  event_loss_config:
    bce_weight: 0.0
    pos_weight: 2.0
    gjs_weight: 1.0
    gjs_pi1: 0.5
    lovasz_weight: 1.0
  event_eval_config:
    thr_min: 0.05
    thr_max: 0.95
    thr_steps: 19
    clean_enabled: True
    clean_open_ksize: 3
    clean_keep_largest: False
    clean_min_area: 0
  val_preview_count: 8

DISTRIBUTED:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: auto

DATA:
  dataset:
    file_name: hand_event_stream_dataset
    class_name: HandEventStreamDataset
    dataset_init_args:
      root_dir: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNew
      window_ms: 36.0
      image_height: 480
      image_width: 640
      held_out_subject: tuxun
      require_teacher: True
      action_only: False
      mask_root: /fs/nexus-projects/DVS_Actions/NatureRoboticsDataNewTeacherMasks
      max_events: 150000
      boundary_ignore_px: 0
      time_ignore_frac: 0.0
      # HARDER event-native augmentation + Fix A no-hand negatives. Shared verbatim
      # with gc_ab / gc_ml so the three runs differ only in the model. Stronger
      # geometric/density/occlusion/noise than the baseline to close the cross-subject
      # LOSO gap; hand_drop_prob adds the NO-HAND null-state negatives.
      augmentation:
        enabled: True
        hflip_prob: 0.5
        vflip_prob: 0.0
        affine_prob: 0.6
        rotate_deg: 20.0
        scale_range: [0.75, 1.35]
        translate_frac: 0.15
        jitter_px: 1.5
        event_drop_prob: 0.6
        event_drop_frac: [0.0, 0.6]
        upsample_prob: 0.3
        upsample_range: [1.0, 1.6]
        area_drop_prob: 0.35
        area_drop_frac: 0.22
        area_drop_count: 2            # multiple occlusion boxes (harder occlusion)
        time_crop_prob: 0.35
        time_crop_min: 0.6
        time_reverse_prob: 0.2
        polarity_flip_prob: 0.1
        time_jitter: 0.015
        noise_frac: 0.10
        min_events: 64
        hand_drop_prob: 0.20          # Fix A: fraction of windows made NO-HAND negatives
        hand_drop_dilate_px: 0        # also drop bg events within N px of any fg event
      num_classes: 1
  dataloader:
    batch_size: 8
    test_batch_size: 8
    num_workers: 8
    persistent_workers: True
    pin_memory: True
    multiprocessing_context: fork
    drop_last: True
    shuffle_train: True
    shuffle_val: False
    shuffle_test: False

MODEL:
  file_name: event_sparse_seg_gc_gate
  class_name: EventSparseSegGCGate
  model_init_args:
    in_features: 2
    stage_channels: [24, 32, 48, 64]
    time_bins: 6
    num_classes: 1
    head_hidden: 64
    norm: ln
    algo: native
    context_channels: 48
    context_gather: True
    aux_shape_head: True              # required by the gate (it drives the veto)
    aux_grid: 32
    aux_shape_weight: 0.2
    coord_mode: relative
    dropout: 0.2
    drop_path: 0.1
    # --- Fix B gate: occupancy x present multiplicative veto -----------------------
    present_init_bias: 3.0            # global hand-present gate starts OPEN (sigma~0.95)
    occ_init_bias: 2.0               # per-cell occupancy gate starts OPEN (sigma~0.88)

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 3e-4
    weight_decay: 1e-4
  gradient_accumulation:
    enabled: False
    scheduling: {0: 4, 4: 2, 8: 1}
  gradient_clip:
    enabled: True
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  stochastic_weight_averaging:
    enabled: True
    swa_lrs: 1e-4

SCHEDULER:
  learning_rate:
    enabled: True
    name: CosineAnnealingLR
    arguments:
      T_max: 50
      eta_min: 1e-6
  early_stopping:
    enabled: False
    monitor: val_loss_epoch
    mode: min
    patience: 5
    min_delta: 1e-5

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: hand_event_seg_sparse_gc_ab

CHECKPOINT:
  enabled: True
  every_n_epochs: 1
  monitor: val_event_f1_epoch
  mode: max
  filename: "best-{epoch:03d}-{val_event_f1_epoch:.4f}"
  save_top_k: 1
  save_last: True
